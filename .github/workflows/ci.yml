name: CI Build

on:
  push:
    branches: [ master ]
    tags: [ '*' ]
  pull_request:
    branches: [ master ]
    types: [ opened, reopened, labeled, synchronize ]

jobs:
  check-formatting:

    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.action != 'labeled' # run for 'opened', 'reopened' and 'synchronize'

    name: Check formatting

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: coursier/setup-action@v3.0.0
        with:
          apps: scalafmt
      - name: Check code formatting
        run: scalafmt --check

  check-snippets:

    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.action != 'labeled'

    name: Check Scala CLI snippets from documentation

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cache/coursier/v1
            ~/.cache/scalacli
            ~/.sbt
            ~/.ivy2/cache
          key: snippets-coursier-${{ runner.os }}-${{ hashFiles('docs/user-guide/*.md') }}
          restore-keys: |
            snippets-coursier-${{ runner.os }}-
      - uses: extractions/setup-just@v4
      - uses: coursier/setup-action@v3.0.0
        with:
          apps: scala-cli sbt
      - name: Run snippets from documentation
        working-directory: docs
        run: |
          scala-cli config power true
          just test-snippets
      - uses: actions/cache/save@v5
        if: always()
        with:
          path: |
            ~/.cache/coursier/v1
            ~/.cache/scalacli
            ~/.sbt
            ~/.ivy2/cache
          key: snippets-coursier-${{ runner.os }}-${{ hashFiles('docs/user-guide/*.md') }}

  build:

    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.action != 'labeled' # run for 'opened', 'reopened' and 'synchronize'

    strategy:
      matrix:
        scala: ['2_13', '3']
        platform: ['jvm', 'js', 'native']
        jvm: ['temurin:1.17.0.15']
      fail-fast: false

    name: "Scala: ${{ matrix.scala == '2_13' && '2.13' || '3' }} / Platform: ${{ matrix.platform }} / JVM: ${{ matrix.jvm }}"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: coursier/cache-action@v8
      - uses: coursier/setup-action@v3.0.0
        with:
          jvm: ${{ matrix.jvm }}
          apps: sbt
      - name: Install native dependencies
        if: matrix.platform == 'native'
        run: sudo apt-get update && sudo apt-get install -y libidn2-dev
      - name: "Clean, compile, test${{matrix.platform == 'jvm' && ', generate coverage report' || ''}}"
        run: sbt ci-${{ matrix.platform }}-${{ matrix.scala }}
      - uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
